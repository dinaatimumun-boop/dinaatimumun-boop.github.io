<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioDiagnos — Asesmen Diagnostik Four-Tier Biologi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --green-900:#15342a;
  --green-700:#2d6a4f;
  --green-600:#387a5b;
  --green-500:#40916c;
  --green-200:#bfe3cf;
  --green-100:#e6f4ec;
  --teal-700:#1c5d72;
  --teal-500:#3a8aa0;
  --bg:#f5f9f6;
  --surface:#ffffff;
  --ink:#16241d;
  --muted:#637b6f;
  --line:#dfeae3;
  --red:#dd5b46;
  --red-bg:#fdebe7;
  --yellow:#e8a73a;
  --yellow-bg:#fdf3e0;
  --ok:#3f9d6f;
  --ok-bg:#e6f4ec;
  --radius:14px;
  --shadow:0 6px 24px rgba(21,52,42,0.08);
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
#app{min-height:100vh; display:flex; flex-direction:column;}

/* ===== Topbar ===== */
.topbar{
  background:linear-gradient(135deg, var(--green-900) 0%, var(--green-700) 55%, var(--teal-700) 100%);
  color:#fff;
  padding:16px 24px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:50;
  box-shadow:0 2px 12px rgba(0,0,0,0.12);
}
.brand{display:flex; align-items:center; gap:12px;}
.brand .logo{width:38px; height:38px; flex-shrink:0;}
.logo .helix{animation: spin 14s linear infinite; transform-origin:50% 50%;}
@media (prefers-reduced-motion: reduce){ .logo .helix{animation:none;} }
@keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
.brand-text h1{font-size:18px; margin:0; font-weight:700; letter-spacing:0.3px;}
.brand-text span{font-size:11px; opacity:0.85; letter-spacing:0.5px; text-transform:uppercase;}
.topbar-actions{display:flex; gap:8px; align-items:center;}
.pill{
  font-size:12px; background:rgba(255,255,255,0.14); padding:6px 12px; border-radius:999px;
  border:1px solid rgba(255,255,255,0.25);
}
.btn-exit{
  background:rgba(255,255,255,0.12); color:#fff; border:1px solid rgba(255,255,255,0.3);
  border-radius:8px; padding:8px 14px; font-size:13px; cursor:pointer; transition:.15s;
}
.btn-exit:hover{background:rgba(255,255,255,0.22);}

/* ===== Layout ===== */
.main{flex:1; width:100%; max-width:1180px; margin:0 auto; padding:28px 20px 60px;}
.main.narrow{max-width:780px;}

/* ===== Cards ===== */
.card{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:28px;
}
.card + .card{margin-top:20px;}
.card h2{margin-top:0; color:var(--green-900);}
.card h3{color:var(--green-900);}

/* ===== Typography ===== */
h1,h2,h3{font-weight:700;}
.eyebrow{
  font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color:var(--green-600);
  font-weight:700; margin-bottom:6px;
}
.lead{color:var(--muted); font-size:15px;}
.center{text-align:center;}

/* ===== Buttons ===== */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border:none; border-radius:10px; padding:13px 24px; font-size:15px; font-weight:600;
  cursor:pointer; transition:.15s; font-family:inherit;
}
.btn-primary{background:var(--green-600); color:#fff;}
.btn-primary:hover{background:var(--green-700); transform:translateY(-1px);}
.btn-secondary{background:var(--green-100); color:var(--green-800,var(--green-900)); border:1px solid var(--green-200);}
.btn-secondary:hover{background:var(--green-200);}
.btn-ghost{background:transparent; color:var(--green-700); border:1px solid var(--line);}
.btn-ghost:hover{background:var(--green-100);}
.btn-danger{background:var(--red-bg); color:var(--red); border:1px solid #f6cfc6;}
.btn-danger:hover{background:#f8d8d0;}
.btn:disabled{opacity:0.4; cursor:not-allowed;}
.btn-block{width:100%;}
.btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;}

/* ===== Forms ===== */
label{display:block; font-size:13px; font-weight:600; color:var(--green-900); margin-bottom:6px;}
input[type=text], input[type=number], input[type=password], select, textarea{
  width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:9px;
  font-size:14.5px; font-family:inherit; background:#fcfdfc; color:var(--ink);
  transition:.15s;
}
input:focus, select:focus, textarea:focus{outline:none; border-color:var(--green-500); box-shadow:0 0 0 3px var(--green-100);}
.field{margin-bottom:16px;}
.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
@media (max-width:640px){ .grid-2{grid-template-columns:1fr;} }

/* ===== Role select ===== */
.role-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:24px;}
@media (max-width:640px){ .role-grid{grid-template-columns:1fr;} }
.role-card{
  background:var(--surface); border:1.5px solid var(--line); border-radius:var(--radius);
  padding:28px; cursor:pointer; transition:.18s; text-align:left; box-shadow:var(--shadow);
}
.role-card:hover{border-color:var(--green-500); transform:translateY(-3px);}
.role-card .icon{width:46px; height:46px; margin-bottom:14px;}
.role-card h3{margin:0 0 6px;}
.role-card p{color:var(--muted); font-size:14px; margin:0;}
.hero{
  text-align:center; padding:50px 20px 10px;
}
.hero-icons{display:flex; justify-content:center; gap:18px; margin-bottom:18px; opacity:0.9;}
.hero-icons svg{width:34px; height:34px;}
.hero h1{font-size:34px; margin:6px 0 8px; color:var(--green-900);}
.hero p{color:var(--muted); max-width:560px; margin:0 auto; font-size:15.5px;}

/* ===== Progress / Tier blocks ===== */
.progressbar-wrap{margin-bottom:6px;}
.progressbar{height:10px; background:var(--green-100); border-radius:999px; overflow:hidden;}
.progressbar > div{height:100%; background:linear-gradient(90deg, var(--green-500), var(--teal-500)); transition:width .25s;}
.progress-meta{display:flex; justify-content:space-between; font-size:13px; color:var(--muted); margin-bottom:8px;}
.timer{
  display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:13px;
  background:var(--green-100); color:var(--green-800,var(--green-900)); padding:5px 12px; border-radius:8px;
}
.tier{
  border:1.5px solid var(--line); border-radius:12px; padding:18px 18px 14px; margin-bottom:16px; background:#fcfdfc;
}
.tier-head{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.tier-num{
  width:26px; height:26px; border-radius:8px; background:var(--green-600); color:#fff;
  display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0;
}
.tier-title{font-weight:700; font-size:14px; color:var(--green-900);}
.tier-sub{font-size:12.5px; color:var(--muted); margin-left:36px; margin-top:-6px; margin-bottom:10px;}
.options{display:flex; flex-direction:column; gap:8px;}
.option{
  display:flex; gap:10px; align-items:flex-start; border:1.5px solid var(--line); border-radius:9px;
  padding:11px 13px; cursor:pointer; transition:.12s; font-size:14px;
}
.option:hover{border-color:var(--green-500); background:var(--green-100);}
.option.selected{border-color:var(--green-600); background:var(--green-100); box-shadow:0 0 0 1px var(--green-600) inset;}
.option input{margin-top:3px; accent-color:var(--green-600); flex-shrink:0;}
.option-letter{font-weight:700; color:var(--green-700); margin-right:2px;}

/* ===== Badges ===== */
.badge{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; padding:4px 10px; border-radius:999px;}
.badge-ok{background:var(--ok-bg); color:var(--ok);}
.badge-mis{background:var(--red-bg); color:var(--red);}
.badge-no{background:#eef0ee; color:var(--muted);}
.badge-partial{background:var(--yellow-bg); color:var(--yellow);}
.badge-high{background:var(--red-bg); color:var(--red);}
.badge-mid{background:var(--yellow-bg); color:#a9760a;}
.badge-low{background:var(--ok-bg); color:var(--ok);}

/* ===== Results ===== */
.stat-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin:18px 0;}
@media (max-width:760px){ .stat-grid{grid-template-columns:1fr 1fr;} }
.stat-box{
  border:1.5px solid var(--line); border-radius:12px; padding:16px; text-align:center; background:#fcfdfc;
}
.stat-box .num{font-size:26px; font-weight:800;}
.stat-box .lbl{font-size:12.5px; color:var(--muted); margin-top:4px;}
.stat-ok .num{color:var(--ok);}
.stat-mis .num{color:var(--red);}
.stat-no .num{color:var(--muted);}
.stat-partial .num{color:var(--yellow);}
.chart-wrap{max-width:320px; margin:10px auto;}
.feedback-item{
  border-left:4px solid var(--red); background:var(--red-bg); border-radius:0 10px 10px 0;
  padding:14px 16px; margin-bottom:12px; font-size:14px;
}
.feedback-item.partial{border-left-color:var(--yellow); background:var(--yellow-bg);}
.feedback-item b{color:var(--green-900);}

/* ===== Tables ===== */
.table-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:12px;}
table{width:100%; border-collapse:collapse; font-size:14px; min-width:560px;}
th,td{text-align:left; padding:11px 14px; border-bottom:1px solid var(--line);}
th{background:var(--green-100); color:var(--green-900); font-size:12.5px; text-transform:uppercase; letter-spacing:0.4px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafdfb;}
.bar-cell{display:flex; align-items:center; gap:8px;}
.bar-track{flex:1; height:8px; background:var(--green-100); border-radius:999px; overflow:hidden; min-width:60px;}
.bar-fill{height:100%; border-radius:999px;}

/* ===== Tabs ===== */
.tabs{display:flex; gap:6px; border-bottom:2px solid var(--line); margin-bottom:20px; flex-wrap:wrap;}
.tab{
  padding:10px 16px; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer;
  border-bottom:3px solid transparent; transition:.15s; margin-bottom:-2px;
}
.tab.active{color:var(--green-700); border-bottom-color:var(--green-600);}
.tab:hover{color:var(--green-700);}

/* ===== Dashboard cards ===== */
.dash-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px;}
@media (max-width:900px){ .dash-grid{grid-template-columns:1fr 1fr;} }
.dash-card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:18px; box-shadow:var(--shadow);}
.dash-card .num{font-size:28px; font-weight:800; color:var(--green-900);}
.dash-card .lbl{font-size:12.5px; color:var(--muted); margin-top:4px;}
.charts-row{display:grid; grid-template-columns:1.3fr 1fr; gap:20px; margin-bottom:20px;}
@media (max-width:900px){ .charts-row{grid-template-columns:1fr;} }
.chart-card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:18px; box-shadow:var(--shadow);}
.chart-card h3{margin-top:0; font-size:15px;}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed; inset:0; background:rgba(21,52,42,0.45); display:flex; align-items:center; justify-content:center;
  z-index:200; padding:16px;
}
.modal{
  background:var(--surface); border-radius:var(--radius); padding:26px; max-width:680px; width:100%;
  max-height:88vh; overflow-y:auto; box-shadow:0 12px 40px rgba(0,0,0,0.25);
}
.modal h3{margin-top:0;}
.modal-close{position:sticky; top:0; float:right; background:none; border:none; font-size:22px; cursor:pointer; color:var(--muted); line-height:1;}

/* ===== Misc ===== */
.divider{height:1px; background:var(--line); margin:22px 0;}
.muted{color:var(--muted); font-size:13.5px;}
.alert{border-radius:10px; padding:14px 16px; font-size:14px; margin-bottom:16px;}
.alert-info{background:var(--green-100); color:var(--green-900); border:1px solid var(--green-200);}
.alert-warn{background:var(--yellow-bg); color:#8a5d0c; border:1px solid #f3dba9;}
.concept-tag{
  display:inline-block; background:var(--green-100); color:var(--green-700); font-size:11.5px; font-weight:700;
  padding:3px 10px; border-radius:999px; margin-bottom:8px; letter-spacing:0.3px; text-transform:uppercase;
}
footer{text-align:center; padding:24px; font-size:12.5px; color:var(--muted);}
.q-list-item{border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:10px; background:#fcfdfc;}
.q-list-item .qtitle{font-weight:600; font-size:14px; margin-bottom:4px;}
.flex-between{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
.link-btn{background:none; border:none; color:var(--green-700); font-weight:600; font-size:13px; cursor:pointer; padding:0;}
.link-btn:hover{text-decoration:underline;}
.loading{display:flex; align-items:center; justify-content:center; min-height:50vh; color:var(--muted); font-size:15px;}
</style>
</head>
<body>
<div id="app"><div class="loading">Memuat BioDiagnos…</div></div>

<script>
/* ============================================================
   ICONS (inline SVG, biology theme)
   ============================================================ */
const ICON_HELIX = `<svg class="helix" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">

const ICON_LEAF = `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M40 8C40 8 16 6 10 22C5 36 16 40 24 40C36 40 42 28 40 8Z" fill="#bfe3cf" stroke="#2d6a4f" stroke-width="2"/>

const ICON_CELL = `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">

  <circle cx="14" cy="30" r="2" fill="#40916c"/>

</svg>`;
const ICON_MICROSCOPE = `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M14 40H34" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M20 40C20 34 22 30 26 28L34 22" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="24" y="10" width="14" height="6" rx="2" transform="rotate(35 24 10)" fill="#bfe3cf" stroke="#2d6a4f" stroke-width="2"/>
  <circle cx="16" cy="34" r="5" fill="#e6f4ec" stroke="#2d6a4f" stroke-width="2"/>
  <path d="M30 18L34 22" stroke="#2d6a4f" stroke-width="2.5" stroke-linecap="round"/>

const ICON_STUDENT = `<svg class="icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="24" cy="17" r="8" fill="#bfe3cf" stroke="#2d6a4f" stroke-width="2"/>

</svg>`;
const ICON_TEACHER = `<svg class="icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="8" y="10" width="32" height="22" rx="3" fill="#e6f4ec" stroke="#1c5d72" stroke-width="2"/>
  <path d="M14 38H34" stroke="#1c5d72" stroke-width="2.5" stroke-linecap="round"/>

  <path d="M16 22L22 26L32 16" stroke="#3a8aa0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

/* ============================================================
   SEED DATA — 10 Four-Tier questions, Genetika SMA
   ============================================================ */
const CONF_OPTIONS = ["Sangat yakin","Yakin","Tidak yakin","Sangat tidak yakin"];

const SEED_QUESTIONS = [
{ id:1, concept:"Gen dan Alel",
  tier1:"Perhatikan pernyataan berikut. Manakah pernyataan yang paling tepat menjelaskan hubungan antara gen dan alel?",
  options:{A:"Gen dan alel adalah istilah yang sama dan dapat digunakan secara bergantian",
           B:"Gen adalah unit dasar pewarisan yang menempati lokus tertentu pada kromosom, sedangkan alel adalah bentuk-bentuk alternatif dari gen tersebut",
           C:"Alel adalah gabungan beberapa gen yang bersama-sama mengatur satu sifat",
           D:"Gen hanya terdapat pada kromosom tubuh (autosom), sedangkan alel hanya terdapat pada kromosom kelamin"},
  correct:"B",
  tier3:{A:"Karena gen dan alel sama-sama terletak di dalam inti sel sehingga fungsinya identik",
         B:"Karena alel merupakan variasi dari gen yang sama pada lokus yang sama, namun dapat menghasilkan ekspresi sifat yang berbeda",
         C:"Karena gen terbentuk dari kumpulan beberapa alel yang berbeda fungsi",
         D:"Karena gen dan alel dibedakan berdasarkan letaknya pada kromosom tubuh atau kromosom kelamin"},
  correctReason:"B"},

{ id:2, concept:"Hukum Mendel (Dominan-Resesif)",
  tier1:"Tanaman ercis berbunga ungu (dominan) disilangkan dengan ercis berbunga putih (resesif), menghasilkan keturunan F1 yang seluruhnya berbunga ungu. Pernyataan manakah yang paling tepat menjelaskan fenomena ini?",
  options:{A:"Sifat ungu lebih dominan karena jumlah individu berbunga ungu di alam selalu lebih banyak daripada putih",
           B:"Alel ungu (dominan) mampu menutupi ekspresi alel putih (resesif) ketika keduanya berada dalam satu individu (heterozigot)",
           C:"Sifat putih hilang secara permanen dari keturunan karena kalah bersaing dengan sifat ungu",
           D:"Alel ungu dan alel putih bercampur sehingga menghasilkan warna baru yang disebut ungu"},
  correct:"B",
  tier3:{A:"Karena dominansi ditentukan oleh kemampuan suatu alel mengekspresikan fenotipnya pada individu heterozigot, bukan oleh frekuensi kemunculannya di populasi",
         B:"Karena gen dominan secara alami selalu diwariskan kepada lebih banyak keturunan dibandingkan gen resesif",
         C:"Karena alel resesif akan musnah secara permanen setelah satu generasi persilangan",
         D:"Karena pewarisan sifat bersifat seperti pencampuran cairan sehingga sifat kedua induk dapat bercampur"},
  correctReason:"A"},

{ id:3, concept:"Genotipe dan Fenotipe",
  tier1:"Seekor kelinci memiliki genotipe Bb untuk warna bulu, dengan alel B (hitam) dominan terhadap alel b (putih). Manakah pernyataan yang tepat mengenai genotipe dan fenotipe kelinci tersebut?",
  options:{A:"Genotipe kelinci adalah hitam, dan fenotipenya adalah Bb",
           B:"Genotipe kelinci adalah Bb (heterozigot), dan fenotipenya adalah hitam",
           C:"Genotipe dan fenotipe kelinci sama-sama Bb",
           D:"Karena genotipenya Bb, fenotipe kelinci pasti berupa campuran warna hitam dan putih (abu-abu)"},
  correct:"B",
  tier3:{A:"Karena genotipe adalah susunan alel (komposisi gen) suatu individu, sedangkan fenotipe adalah sifat yang tampak sebagai hasil ekspresi genotipe",
         B:"Karena genotipe selalu sama dengan fenotipe pada semua individu",
         C:"Karena huruf besar dan huruf kecil pada genotipe menunjukkan warna campuran pada fenotipe",
         D:"Karena fenotipe ditentukan sepenuhnya oleh lingkungan, tanpa pengaruh genotipe"},
  correctReason:"A"},

{ id:4, concept:"Persilangan Monohibrid",
  tier1:"Persilangan antara dua tanaman berbiji bulat heterozigot (Bb x Bb), dengan B (bulat) dominan terhadap b (kerut). Berapa perbandingan fenotipe bulat : kerut pada keturunan F1?",
  options:{A:"1 : 1", B:"3 : 1", C:"1 : 2 : 1", D:"9 : 3 : 3 : 1"},
  correct:"B",
  tier3:{A:"Karena persilangan Bb x Bb menghasilkan genotipe BB, Bb, Bb, bb dengan rasio 1:2:1, sehingga fenotipe bulat (BB dan Bb) : kerut (bb) = 3 : 1",

/* ============================================================
   CLASSIFICATION LOGIC (Four-Tier rules)
   ============================================================ */
function isHighConf(v){ return v === 'Sangat yakin' || v === 'Yakin'; }
function classify(q, ans){
  const correct1 = ans.t1 === q.correct;
  const correct3 = ans.t3 === q.correctReason;
  const conf2 = isHighConf(ans.t2);
  const conf4 = isHighConf(ans.t4);
  if(!correct1){
    return conf2 ? 'Miskonsepsi' : 'Tidak Paham Konsep';
  } else {
    return (correct3 && conf2 && conf4) ? 'Paham Konsep' : 'Pemahaman Parsial';
  }
}

   ============================================================ */
function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
function setApp(html){ document.getElementById('app').innerHTML = html; }
function render(){
  let body = '';
  switch(state.screen){
    case 'role': body = viewRole(); break;
    case 'studentLogin': body = viewStudentLogin(); break;
    case 'instructions': body = viewInstructions(); break;
    case 'test': body = viewTest(); break;
    case 'results': body = viewResults(); break;
    case 'teacherLogin': body = viewTeacherLogin(); break;
    case 'teacherDashboard': body = viewTeacherDashboard(); break;
    default: body = viewRole();
  }
  setApp(topbar() + body + viewModal() + footerHtml());
  // post-render hooks
  if(state.screen === 'results') drawResultsChart();
  if(state.screen === 'teacherDashboard') drawTeacherCharts();
}

  return `<footer>BioDiagnos · Sistem Asesmen Diagnostik Four-Tier &amp; Learning Analytics — Materi Genetika SMA</footer>`;

function topbar(){
  let actions = '';
  if(state.screen !== 'role'){
    actions += `<button class="btn-exit" onclick="goHome()">⟵ Kembali ke Beranda</button>`;
  }
  if(state.teacherLoggedIn && state.screen === 'teacherDashboard'){
    actions = `<span class="pill">Mode Guru</span>` + actions;
  }
  return `
  <div class="topbar">
    <div class="brand">
      <div class="logo">${ICON_HELIX}</div>
      <div class="brand-text">
        <h1>BioDiagnos</h1>
        <span>Four-Tier Diagnostic &amp; Learning Analytics</span>
      </div>

    <div class="topbar-actions">${actions}</div>
  </div>`;
}

  // reset transient state
  if(state.timerHandle){ clearInterval(state.timerHandle); state.timerHandle = null; }

  state.answers = {};

function startTest(){
  state.testIndex = 0;
  state.answers = {};
  DB.questions.forEach(q => state.answers[q.id] = {t1:null,t2:null,t3:null,t4:null});
  state.timerSeconds = 0;
  if(state.timerHandle) clearInterval(state.timerHandle);
  state.timerHandle = setInterval(()=>{
    state.timerSeconds++;
    const tEl = document.getElementById('test-timer');
    if(tEl) tEl.textContent = formatTime(state.timerSeconds);
  },1000);
  state.screen = 'test';
  render();
}
function formatTime(sec){
  const m = Math.floor(sec/60).toString().padStart(2,'0');
  const s = (sec%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

/* ============================================================
   VIEW: TEST (one question per page)
   ============================================================ */
function viewTest(){
  const idx = state.testIndex;
  const q = DB.questions[idx];
  const total = DB.questions.length;
  const pct = Math.round(((idx)/total)*100);
  const ans = state.answers[q.id];

  const tier1Opts = Object.entries(q.options).map(([k,v]) => optionRow('t1', k, v, ans.t1 === k)).join('');
  const tier2Opts = CONF_OPTIONS.map(c => optionRow('t2', c, c, ans.t2 === c, true)).join('');
  const tier3Opts = Object.entries(q.tier3).map(([k,v]) => optionRow('t3', k, v, ans.t3 === k)).join('');
  const tier4Opts = CONF_OPTIONS.map(c => optionRow('t4', c, c, ans.t4 === c, true)).join('');

  const allAnswered = ans.t1 && ans.t2 && ans.t3 && ans.t4;

  return `
  <div class="main narrow">
    <div class="card">
      <div class="progress-meta">
        <span>Soal ${idx+1} dari ${total}</span>
        <span class="timer" id="test-timer">⏱ ${formatTime(state.timerSeconds)}</span>
      </div>
      <div class="progressbar-wrap"><div class="progressbar"><div style="width:${pct}%"></div></div></div>

      <div class="concept-tag">Konsep: ${escHtml(q.concept)}</div>

      <div class="tier">
        <div class="tier-head"><div class="tier-num">1</div><div class="tier-title">Tier 1 — Jawaban Utama</div></div>
        <div class="tier-sub" style="margin-bottom:12px;">${escHtml(q.tier1)}</div>
        <div class="options">${tier1Opts}</div>
      </div>

      <div class="tier">
        <div class="tier-head"><div class="tier-num">2</div><div class="tier-title">Tier 2 — Tingkat Keyakinan Jawaban</div></div>
        <div class="tier-sub">Seberapa yakin kamu dengan jawabanmu pada Tier 1?</div>
        <div class="options">${tier2Opts}</div>
      </div>

      <div class="tier">
        <div class="tier-head"><div class="tier-num">3</div><div class="tier-title">Tier 3 — Alasan Memilih Jawaban</div></div>
        <div class="tier-sub" style="margin-bottom:12px;">Pilih alasan yang paling sesuai dengan alasanmu memilih jawaban di Tier 1.</div>
        <div class="options">${tier3Opts}</div>
      </div>

      <div class="tier">
        <div class="tier-head"><div class="tier-num">4</div><div class="tier-title">Tier 4 — Tingkat Keyakinan Alasan</div></div>
        <div class="tier-sub">Seberapa yakin kamu dengan alasan pada Tier 3?</div>
        <div class="options">${tier4Opts}</div>
      </div>

      ${!allAnswered ? `<div class="alert alert-warn">Lengkapi keempat tier sebelum melanjutkan ke soal berikutnya.</div>` : ''}

      <div class="btn-row">
        <button class="btn btn-ghost" ${idx===0?'disabled':''} onclick="changeQuestion(-1)">← Sebelumnya</button>
        ${idx < total-1
          ? `<button class="btn btn-primary" ${allAnswered?'':'disabled'} onclick="changeQuestion(1)">Berikutnya →</button>`
          : `<button class="btn btn-primary" ${allAnswered?'':'disabled'} onclick="confirmSubmit()">Selesai &amp; Kirim Jawaban ✓</button>`
        }
      </div>
    </div>
  </div>`;
}
function optionRow(tier, value, label, selected, isConf){
  const id = `opt-${tier}-${value}`.replace(/\s+/g,'_');
  const prefix = isConf ? '' : `<span class="option-letter">${escHtml(value)}.</span> `;
  return `
  <label class="option ${selected?'selected':''}" for="${id}">
    <input type="radio" id="${id}" name="${tier}" value="${escAttr(value)}" ${selected?'checked':''} onchange="setAnswer('${tier}', '${escJs(value)}')">
    <span>${prefix}${escHtml(label)}</span>
  </label>`;
}
function setAnswer(tier, value){
  const q = DB.questions[state.testIndex];
  state.answers[q.id][tier] = value;
  render();
}
function changeQuestion(delta){
  const newIdx = state.testIndex + delta;
  if(newIdx < 0 || newIdx >= DB.questions.length) return;
  state.testIndex = newIdx;
  render();
}

/* Confirm before ending test */
function confirmSubmit(){
  state.modal = {
    title: 'Konfirmasi Pengiriman Jawaban',
    body: `<p>Kamu telah menyelesaikan seluruh ${DB.questions.length} soal. Setelah dikirim, jawaban <b>tidak dapat diubah lagi</b>.</p><p>Apakah kamu yakin ingin mengakhiri tes dan melihat hasil analisisnya?</p>`,
    actions: `
      <button class="btn btn-ghost" onclick="closeModal()">Batal, periksa lagi</button>
      <button class="btn btn-primary" onclick="finalizeSubmit()">Ya, Kirim Jawaban</button>`
  };
  render();
}
function finalizeSubmit(){
  if(state.timerHandle){ clearInterval(state.timerHandle); state.timerHandle = null; }
  closeModalSilently();

  // Build per-question results
  const detail = DB.questions.map(q => {
    const ans = state.answers[q.id];
    const cat = classify(q, ans);
    return { qid:q.id, concept:q.concept, t1:ans.t1, t2:ans.t2, t3:ans.t3, t4:ans.t4, category:cat };
  });
  const counts = {};
  CAT_LIST.forEach(c => counts[c] = 0);
  detail.forEach(d => counts[d.category]++);
  const total = detail.length;
  const percentages = {};
  CAT_LIST.forEach(c => percentages[c] = Math.round((counts[c]/total)*1000)/10);

  const record = {
    id: 'r_' + Date.now() + '_' + Math.floor(Math.random()*1000),
    nama: state.student.nama,
    nis: state.student.nis,
    kelas: state.student.kelas,
    sekolah: state.student.sekolah,
    timestamp: new Date().toISOString(),
    durationSeconds: state.timerSeconds,
    detail,
    counts,
    percentages
  };

  DB.responses.push(record);
  saveResponses();

  state.lastResult = record;
  state.screen = 'results';
  render();
}

/* ============================================================
   VIEW: STUDENT RESULTS
   ============================================================ */
function viewResults(){
  const r = state.lastResult;
  if(!r) return `<div class="main"><div class="card"><p>Tidak ada hasil untuk ditampilkan.</p><div class="btn-row"><button class="btn btn-primary" onclick="goHome()">Kembali ke Beranda</button></div></div></div>`;

  const stats = CAT_LIST.map(c => {
    const cls = { 'Paham Konsep':'stat-ok','Miskonsepsi':'stat-mis','Tidak Paham Konsep':'stat-no','Pemahaman Parsial':'stat-partial'}[c];
    return `<div class="stat-box ${cls}"><div class="num">${r.percentages[c]}%</div><div class="lbl">${c}</div></div>`;
  }).join('');

  // Concepts needing improvement: those with Miskonsepsi or Tidak Paham or Pemahaman Parsial
  const problemConcepts = r.detail.filter(d => d.category !== 'Paham Konsep');
  const conceptSet = new Set();
  const feedbackItems = [];
  problemConcepts.forEach(d => {
    if(conceptSet.has(d.concept)) return;
    conceptSet.add(d.concept);
    const text = CONCEPT_FEEDBACK[d.concept] || `Anda perlu memperdalam konsep ${d.concept}.`;
    const cls = d.category === 'Miskonsepsi' ? '' : 'partial';
    feedbackItems.push(`<div class="feedback-item ${cls}"><b>${escHtml(d.concept)}</b> <span class="badge ${CAT_BADGE[d.category]}" style="margin-left:6px;">${d.category}</span><br>${escHtml(text)}</div>`);
  });

  const conceptListHtml = conceptSet.size
    ? `<ul style="margin:8px 0 0 18px; padding:0;">${[...conceptSet].map(c=>`<li>${escHtml(c)}</li>`).join('')}</ul>`
    : `<p class="muted">Tidak ada konsep yang memerlukan perbaikan khusus — pertahankan pemahamanmu!</p>`;

  return `
  <div class="main narrow">
    <div class="card">
      <div class="eyebrow">Hasil Asesmen Diagnostik</div>
      <h2>Profil Pemahaman Konsep — ${escHtml(r.nama)}</h2>
      <p class="lead">${escHtml(r.kelas)} · ${escHtml(r.sekolah)} · Waktu pengerjaan: ${formatTime(r.durationSeconds)}</p>

      <div class="chart-wrap"><canvas id="result-chart"></canvas></div>
      <div class="stat-grid">${stats}</div>

      <div class="divider"></div>
      <h3>Konsep yang Perlu Diperbaiki</h3>
      ${conceptListHtml}

      <div class="divider"></div>
      <h3>Feedback Pembelajaran</h3>
      ${feedbackItems.length ? feedbackItems.join('') : `<p class="muted">Tidak ada catatan miskonsepsi spesifik. Kerja bagus!</p>`}

      <div class="alert alert-info" style="margin-top:18px;">
        Hasil ini bersifat diagnostik dan <b>tidak mempengaruhi nilai akademikmu</b>. Hasil ini juga akan tersedia bagi guru pada Learning Analytics Dashboard untuk membantu merancang pembelajaran lanjutan.
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="goHome()">Selesai — Kembali ke Beranda</button>
      </div>
    </div>
  </div>`;
}
function drawResultsChart(){
  const r = state.lastResult;
  if(!r) return;
  const canvas = document.getElementById('result-chart');
  if(!canvas) return;
  if(chartRefs.result) chartRefs.result.destroy();
  chartRefs.result = new Chart(canvas, {
    type:'doughnut',
    data:{
      labels: CAT_LIST,
      datasets:[{ data: CAT_LIST.map(c=>r.percentages[c]), backgroundColor: CAT_LIST.map(c=>CAT_COLOR[c]) }]
    },
    options:{ plugins:{ legend:{ position:'bottom', labels:{font:{size:11}} } }, cutout:'60%' }
  });
}

/* ============================================================
   ANALYTICS HELPERS
   ============================================================ */
function aggregateAll(){
  // returns { totalStudents, catCounts{cat->count over all answers}, conceptStats{concept-> {total, mis, ok, partial, no}} }
  const catCounts = {}; CAT_LIST.forEach(c=>catCounts[c]=0);
  const conceptStats = {};
  DB.questions.forEach(q => { conceptStats[q.concept] = { total:0, 'Paham Konsep':0,'Miskonsepsi':0,'Tidak Paham Konsep':0,'Pemahaman Parsial':0 }; });

  DB.responses.forEach(resp => {
    resp.detail.forEach(d => {
      catCounts[d.category] = (catCounts[d.category]||0) + 1;
      if(!conceptStats[d.concept]) conceptStats[d.concept] = { total:0, 'Paham Konsep':0,'Miskonsepsi':0,'Tidak Paham Konsep':0,'Pemahaman Parsial':0 };
      conceptStats[d.concept].total++;
      conceptStats[d.concept][d.category]++;
    });
  });
  return { totalStudents: DB.responses.length, catCounts, conceptStats };
}

/* --- Concepts tab --- */
function teacherConcepts(){
  const agg = aggregateAll();
  const rows = Object.entries(agg.conceptStats).map(([concept, cs]) => {
    const misPct = cs.total ? Math.round((cs['Miskonsepsi']/cs.total)*1000)/10 : 0;
    let levelClass, levelLabel, barColor;
    if(misPct >= 50){ levelClass='badge-high'; levelLabel='Tinggi'; barColor='var(--red)'; }
    else if(misPct >= 25){ levelClass='badge-mid'; levelLabel='Sedang'; barColor='var(--yellow)'; }
    else { levelClass='badge-low'; levelLabel='Rendah'; barColor='var(--ok)'; }

    const rec = misPct >= 50
      ? (TEACHER_RECOMMENDATION[concept] || `Disarankan melakukan pembelajaran ulang pada konsep ${concept} dengan pendekatan visual dan diskusi kelompok.`)
      : (misPct >= 25 ? `Disarankan memberikan latihan tambahan dan penguatan pada konsep ${concept} agar miskonsepsi tidak meningkat.` : `Pemahaman pada konsep ${concept} relatif baik; pertahankan dengan latihan pengayaan ringan.`);

    return { concept, misPct, levelClass, levelLabel, barColor, rec, total: cs.total };
  }).sort((a,b)=>b.misPct - a.misPct);

  const tableRows = rows.map(r => `
    <tr>
      <td><b>${escHtml(r.concept)}</b></td>
      <td>${r.total}</td>
      <td>
        <div class="bar-cell">
          <div class="bar-track"><div class="bar-fill" style="width:${r.misPct}%; background:${r.barColor};"></div></div>
          <span>${r.misPct}%</span>
        </div>
      </td>
      <td><span class="badge ${r.levelClass}">${r.levelLabel}</span></td>
    </tr>`).join('');

  const recList = rows.filter(r=>r.total>0).map(r => `
    <div class="feedback-item ${r.misPct>=50?'':'partial'}" style="${r.misPct<25?'border-left-color:var(--ok); background:var(--ok-bg);':''}">
      <b>${escHtml(r.concept)}</b> — tingkat miskonsepsi ${r.misPct}%<br>${escHtml(r.rec)}
    </div>`).join('');

  return `
  <div class="table-wrap">
    <table>
      <thead><tr><th>Konsep / Indikator</th><th>Jumlah Respons</th><th>Tingkat Miskonsepsi</th><th>Status</th></tr></thead>
      <tbody>${tableRows || `<tr><td colspan="4" class="muted">Belum ada data.</td></tr>`}</tbody>
    </table>
  </div>
  <div class="divider"></div>
  <h3>Rekomendasi Tindak Lanjut Pembelajaran</h3>
  ${recList || `<p class="muted">Belum ada data untuk dianalisis.</p>`}
  `;
}

          <div class="muted">Jawaban benar Tier 1: <b>${escHtml(q.correct)}</b> · Alasan benar Tier 3: <b>${escHtml(q.correctReason)}</b></div>
        </div>
        <div class="btn-row" style="margin-top:0;">
          <button class="btn btn-ghost" onclick="editQuestion(${q.id})">Edit</button>
          <button class="btn btn-danger" onclick="deleteQuestion(${q.id})">Hapus</button>
        </div>
      </div>
    </div>`).join('');

  return `
  <div class="flex-between" style="margin-bottom:14px;">
    <p class="lead" style="margin:0;">Kelola bank soal Four-Tier Diagnostic Test. Total soal: <b>${DB.questions.length}</b>.</p>
    <button class="btn btn-primary" onclick="addQuestion()">+ Tambah Soal Baru</button>
  </div>
  ${list}`;
}

function blankQuestion(){
  return {
    id: Date.now(),
    concept: '',
    tier1: '',
    options: {A:'',B:'',C:'',D:''},
    correct: 'A',
    tier3: {A:'',B:'',C:'',D:''},
    correctReason: 'A'
  };
}
function addQuestion(){
  openQuestionForm(blankQuestion(), true);
}
function editQuestion(id){
  const q = DB.questions.find(q=>q.id===id);
  openQuestionForm(JSON.parse(JSON.stringify(q)), false);
}
function openQuestionForm(q, isNew){
  state.editingQuestion = q;
  const letters = ['A','B','C','D'];
  const optFields = letters.map(L => `
    <div class="field">
      <label>Pilihan Jawaban ${L} (Tier 1)</label>
      <input type="text" id="qf-opt-${L}" value="${escAttr(q.options[L]||'')}">
    </div>`).join('');
  const reasonFields = letters.map(L => `
    <div class="field">
      <label>Pilihan Alasan ${L} (Tier 3)</label>
      <input type="text" id="qf-reason-${L}" value="${escAttr(q.tier3[L]||'')}">
    </div>`).join('');
  const correctSel = letters.map(L=>`<option value="${L}" ${q.correct===L?'selected':''}>${L}</option>`).join('');
  const correctReasonSel = letters.map(L=>`<option value="${L}" ${q.correctReason===L?'selected':''}>${L}</option>`).join('');

  state.modal = {
    title: isNew ? 'Tambah Soal Baru' : 'Edit Soal',
    wide: true,
    body: `
      <div class="field">
        <label>Indikator / Konsep</label>
        <input type="text" id="qf-concept" value="${escAttr(q.concept)}" placeholder="Contoh: Hukum Mendel (Dominan-Resesif)">
      </div>
      <div class="field">
        <label>Pertanyaan Tier 1</label>
        <textarea id="qf-tier1" rows="3">${escHtml(q.tier1)}</textarea>
      </div>
      <div class="grid-2">${optFields}</div>
      <div class="field">
        <label>Jawaban Benar (Tier 1)</label>
        <select id="qf-correct">${correctSel}</select>
      </div>
      <div class="divider"></div>
      <div class="grid-2">${reasonFields}</div>
      <div class="field">
        <label>Alasan Benar (Tier 3)</label>
        <select id="qf-correctreason">${correctReasonSel}</select>
      </div>
    `,
    actions: `
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveQuestionForm(${isNew}, ${q.id})">Simpan Soal</button>`
  };
  render();
}
function saveQuestionForm(isNew, id){
  const letters = ['A','B','C','D'];
  const q = {
    id: isNew ? Date.now() : id,
    concept: document.getElementById('qf-concept').value.trim() || 'Tanpa Konsep',
    tier1: document.getElementById('qf-tier1').value.trim(),
    options: {}, tier3: {},
    correct: document.getElementById('qf-correct').value,
    correctReason: document.getElementById('qf-correctreason').value
  };
  letters.forEach(L => {
    q.options[L] = document.getElementById(`qf-opt-${L}`).value.trim();
    q.tier3[L] = document.getElementById(`qf-reason-${L}`).value.trim();
  });

  if(isNew){
    DB.questions.push(q);
  } else {
    const idx = DB.questions.findIndex(qq=>qq.id===id);
    if(idx>=0) DB.questions[idx] = q;
  }
  saveQuestions();
  closeModal();
}
function deleteQuestion(id){
  state.modal = {
    title: 'Hapus Soal?',
    body: `<p>Soal ini akan dihapus secara permanen dari bank soal. Lanjutkan?</p>`,
    actions: `
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-danger" onclick="reallyDeleteQuestion(${id})">Hapus</button>`
  };
  render();
}
function reallyDeleteQuestion(id){
  DB.questions = DB.questions.filter(q=>q.id!==id);
  saveQuestions();
  closeModal();
}

/* --- Teacher charts --- */
function drawTeacherCharts(){
  if(state.teacherTab !== 'overview') return;
  const agg = aggregateAll();
  const totalAnswers = Object.values(agg.catCounts).reduce((a,b)=>a+b,0);

  const barCanvas = document.getElementById('chart-mis-bar');
  const pieCanvas = document.getElementById('chart-cat-pie');
  if(!barCanvas || !pieCanvas) return;

  const concepts = Object.keys(agg.conceptStats);
  const misPct = concepts.map(c => {
    const cs = agg.conceptStats[c];
    return cs.total ? Math.round((cs['Miskonsepsi']/cs.total)*1000)/10 : 0;
  });
  const barColors = misPct.map(p => p>=50 ? '#dd5b46' : (p>=25 ? '#e8a73a' : '#3f9d6f'));

  if(chartRefs.bar) chartRefs.bar.destroy();
  chartRefs.bar = new Chart(barCanvas, {
    type:'bar',
    data:{ labels: concepts, datasets:[{ label:'% Miskonsepsi', data: misPct, backgroundColor: barColors, borderRadius:6 }] },
    options:{
      indexAxis:'y',
      plugins:{ legend:{display:false} },
      scales:{ x:{ min:0, max:100, ticks:{ callback:v=>v+'%' } } }
    }
  });

  if(chartRefs.pie) chartRefs.pie.destroy();
  chartRefs.pie = new Chart(pieCanvas, {
    type:'pie',
    data:{
      labels: CAT_LIST,
      datasets:[{ data: CAT_LIST.map(c=>agg.catCounts[c]), backgroundColor: CAT_LIST.map(c=>CAT_COLOR[c]) }]
    },
    options:{ plugins:{ legend:{ position:'bottom', labels:{font:{size:11}} } } }
  });
}

/* ============================================================
   MODAL
   ============================================================ */
function viewModal(){
  if(!state.modal) return '';
  const m = state.modal;
  return `
  <div class="modal-overlay" onclick="if(event.target===this) closeModal()">
    <div class="modal" style="${m.wide?'max-width:760px;':''}">
      <button class="modal-close" onclick="closeModal()">×</button>
      <h3>${m.title}</h3>
      <div>${m.body}</div>
      <div class="btn-row">${m.actions||''}</div>
    </div>
  </div>`;
}
function closeModal(){ state.modal = null; state.editingQuestion = null; render(); }
function closeModalSilently(){ state.modal = null; }

/* ============================================================
   ESCAPE HELPERS
   ============================================================ */
function escHtml(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s){ return escHtml(s).replace(/"/g,'&quot;'); }
function escJs(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

/* ============================================================
   INIT
   ============================================================ */
(function init(){
  loadDB();
  render();
})();
</script>
